<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actu NC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f0f0f;
  --surface: #1a1a1a;
  --border:  #242424;
  --border2: #303030;
  --text:    #f0f0f0;
  --muted:   #777;
  --muted2:  #555;
  --accent:  #009BDE; /* bleu NC */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
}
.header-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center; gap: 12px;
  height: 46px;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 700;
  color: var(--text); letter-spacing: -0.02em;
  text-decoration: none; white-space: nowrap; flex-shrink: 0;
}
.logo-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0;
  letter-spacing: -0.02em;
}
.search-wrap { flex: 1; position: relative; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--muted); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 7px 12px 7px 36px;
  outline: none; transition: border-color .2s;
}
#search:focus { border-color: #555; }
#search::placeholder { color: var(--muted2); }
.cache-info { font-size: 11px; color: var(--muted2); white-space: nowrap; flex-shrink: 0; }
.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--border2);
  border-radius: 6px; color: var(--muted);
  font-family: inherit; font-size: 12px;
  padding: 5px 10px; cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0;
}
.refresh-btn:hover { border-color: #555; color: var(--text); }
.refresh-btn.spinning svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tabs ── */
.tabs-bar {
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
}
.tabs-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center;
  overflow-x: auto; scrollbar-width: none;
}
.tabs-inner::-webkit-scrollbar { display: none; }
.tab-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 36px;
  color: var(--muted);
  font-family: inherit; font-size: 13px; font-weight: 400;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; transition: color .15s;
  white-space: nowrap; flex-shrink: 0;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
.tab-btn:hover:not(.active) { color: #bbb; }

/* ── Error banner ── */
.error-banner {
  background: #1a0a0a; border: 1px solid #3a1a1a;
  border-radius: 6px; margin: 1rem 1.5rem;
  padding: 10px 14px; font-size: 12px; color: #f06060;
  display: none;
}

/* ── Content ── */
.content { max-width: 860px; margin: 0 auto; }

/* ── Date group header ── */
.date-header {
  padding: 12px 1.5rem 6px;
  font-size: 11px; font-weight: 600;
  color: var(--muted2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ── Article row ── */
.article-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 1.5rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  text-decoration: none;
  transition: background .1s;
  color: inherit;
}
.article-row:hover { background: var(--surface); }

.source-avatar {
  width: 32px; height: 32px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0; margin-top: 1px;
  user-select: none;
}

.article-body { flex: 1; min-width: 0; }

.article-title {
  font-size: 13px; font-weight: 500;
  color: var(--text); line-height: 1.4;
  margin-bottom: 3px;
}

.article-meta {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
  margin-bottom: 4px;
}
.article-meta-sep { color: var(--muted2); }
.tag-badge {
  padding: 0px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 500;
  border: 1px solid var(--border2);
  background: var(--surface); color: var(--muted);
}
.tag-badge.tag-politique { background: rgba(0,155,222,.12); color: #4db8f0; border-color: rgba(0,155,222,.25); }
.tag-badge.tag-eco       { background: rgba(40,167,69,.12);  color: #5cb85c; border-color: rgba(40,167,69,.25); }
.tag-badge.tag-tech      { background: rgba(150,60,200,.12); color: #ba68c8; border-color: rgba(150,60,200,.25); }

.article-summary {
  font-size: 12px; color: #888; line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
  overflow: hidden;
}

.article-right {
  display: flex; flex-direction: column; align-items: flex-end;
  flex-shrink: 0; padding-top: 2px;
}
.read-link {
  font-size: 11px; color: var(--muted2);
  display: flex; align-items: center; gap: 4px;
  padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border);
  transition: all .15s; white-space: nowrap;
}
.article-row:hover .read-link { border-color: var(--border2); color: var(--text); }
.read-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Empty / skeleton ── */
.empty {
  padding: 4rem 1.5rem; text-align: center;
  font-size: 13px; color: var(--muted);
}
.skeleton {
  background: var(--surface); border-radius: 5px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }
.sk-avatar { width: 32px; height: 32px; border-radius: 7px; flex-shrink: 0; }
.sk-title  { height: 13px; width: 72%; margin-bottom: 7px; }
.sk-line   { height: 11px; width: 38%; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">NC</div>
      Actu NC
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="search" placeholder="Rechercher ..." autocomplete="off">
    </div>
    <span class="cache-info" id="cache-info"></span>
    <button class="refresh-btn" id="refresh-btn">
      <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
      </svg>
      Rafraîchir
    </button>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tag="all">Tout</button>
    <button class="tab-btn" data-tag="politique">Politique / Société</button>
    <button class="tab-btn" data-tag="eco">Économie</button>
    <button class="tab-btn" data-tag="tech">Tech / Numérique</button>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="content">
  <div id="feed"></div>
</div>

<script>
// ⚠️ Remplace cette URL par celle de ton backend Railway une fois déployé
const API = 'https://actu-nc-production.up.railway.app';

let allArticles = [];
let currentTag  = 'all';
let searchQ     = '';

// Couleurs sources
const SOURCE_PALETTE = [
  '#009BDE','#e53935','#43a047','#8e24aa','#f4511e',
  '#00897b','#ffb300','#5e35b1','#0078d4','#00acc1',
  '#f57c00','#d81b60','#039be5','#7cb342','#6d4c41',
];
function sourceColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return SOURCE_PALETTE[Math.abs(h) % SOURCE_PALETTE.length];
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function loadFeed(forceRefresh = false) {
  showSkeletons();
  hideError();
  try {
    if (forceRefresh) await fetch(`${API}/api/refresh`);
    const res = await fetch(`${API}/api/feed?limit=200`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allArticles = data.articles || [];
    if (data.cached_at) {
      const d = new Date(data.cached_at);
      document.getElementById('cache-info').textContent =
        'màj ' + d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) +
        ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    }
    render();
  } catch (e) {
    showError(`Impossible de joindre l'API : ${e.message}`);
    document.getElementById('feed').innerHTML = '<div class="empty">— aucune donnée —</div>';
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let articles = allArticles;
  if (currentTag !== 'all') articles = articles.filter(a => a.tag === currentTag);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    articles = articles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.excerpt  || '').toLowerCase().includes(q) ||
      (a.summary  || '').toLowerCase().includes(q)
    );
  }

  if (!articles.length) {
    document.getElementById('feed').innerHTML = '<div class="empty">— aucun résultat —</div>';
    return;
  }

  // Grouper par date
  const groups = new Map();
  for (const a of articles) {
    const key = a.date ? dateGroupKey(a.date) : 'Ancien';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(a);
  }

  let html = '';
  for (const [label, items] of groups) {
    html += `<div class="date-header">${label}</div>`;
    for (const a of items) html += articleHTML(a);
  }
  document.getElementById('feed').innerHTML = html;
}

function articleHTML(a) {
  const color    = sourceColor(a.source);
  const initial  = a.source.trim().charAt(0).toUpperCase();
  const date     = a.date ? relativeDate(a.date) : '';
  const tagLabel = {politique:'Politique', eco:'Économie', tech:'Tech'}[a.tag] || a.tag;
  const summary  = a.summary || a.excerpt || '';

  return `
  <a class="article-row" href="${esc(a.url)}" target="_blank" rel="noopener">
    <div class="source-avatar" style="background:${color}">${initial}</div>
    <div class="article-body">
      <div class="article-title">${esc(a.title)}</div>
      <div class="article-meta">
        <span>${esc(a.source)}</span>
        <span class="article-meta-sep">·</span>
        <span>${date}</span>
        <span class="article-meta-sep">·</span>
        <span class="tag-badge tag-${a.tag}">${tagLabel}</span>
      </div>
      ${summary ? `<div class="article-summary">${esc(summary)}</div>` : ''}
    </div>
    <div class="article-right">
      <div class="read-link">
        Lire
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </div>
    </div>
  </a>`;
}

// ── Skeletons ─────────────────────────────────────────────────────────────────
function showSkeletons() {
  document.getElementById('feed').innerHTML = Array.from({length: 10}, () => `
    <div class="article-row" style="cursor:default">
      <div class="skeleton sk-avatar"></div>
      <div class="article-body" style="flex:1">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-line"></div>
      </div>
    </div>`).join('');
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relativeDate(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600)   return Math.floor(diff / 60) + 'min';
  if (diff < 86400)  return Math.floor(diff / 3600) + 'h';
  if (diff < 604800) return Math.floor(diff / 86400) + 'j';
  return new Date(iso).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}

function dateGroupKey(iso) {
  const d = new Date(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const articleDay = new Date(d); articleDay.setHours(0,0,0,0);
  const diff = (today - articleDay) / 86400000;
  if (diff < 1) {
    const label = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    return label.charAt(0).toUpperCase() + label.slice(1);
  }
  if (diff < 2) return 'Hier';
  if (diff < 7) {
    const label = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
    return label.charAt(0).toUpperCase() + label.slice(1);
  }
  return d.toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'});
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// ── Events ────────────────────────────────────────────────────────────────────
document.querySelector('.tabs-inner').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  currentTag = btn.dataset.tag;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); render(); }, 250);
});

document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  await loadFeed(true);
  btn.classList.remove('spinning');
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadFeed();
setInterval(() => loadFeed(), 60 * 60 * 1000); // refresh toutes les heures
</script>
</body>
</html>
